<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M2V — 卡拉OK视频生成器</title>
  <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

  <!-- ========== 登录/注册弹窗 ========== -->
  <div id="auth-overlay" class="overlay">
    <div class="auth-card">
      <h2 id="auth-title">🎤 M2V 登录</h2>
      <form id="auth-form">
        <input id="auth-username" type="text" placeholder="用户名" autocomplete="username" style="display:none">
        <input id="auth-email" type="email" placeholder="邮箱" required autocomplete="email">
        <input id="auth-password" type="password" placeholder="密码 (至少6位)" required autocomplete="current-password">
        <button type="submit" id="auth-submit">登录</button>
      </form>
      <p class="auth-switch">
        <span id="auth-toggle-text">没有账号？</span>
        <a href="#" id="auth-toggle">去注册</a>
      </p>
      <p id="auth-error" class="error-text"></p>
    </div>
  </div>

  <!-- ========== 主界面 ========== -->
  <div id="app" style="display:none">
    <!-- 顶部导航 -->
    <header>
      <div class="header-left">
        <h1>🎤 M2V</h1>
        <span class="subtitle">卡拉OK视频生成器</span>
      </div>
      <div class="header-right">
        <span id="user-info"></span>
        <span id="user-credits" class="badge"></span>
        <a href="/editor" target="_blank" class="btn btn-sm">📝 时间轴编辑器</a>
        <button id="btn-logout" class="btn btn-sm btn-outline">退出</button>
      </div>
    </header>

    <!-- 上传区 -->
    <section id="upload-section">
      <div class="upload-card">
        <h2>🎵 上传音乐 + 歌词</h2>
        <form id="upload-form">
          <div class="upload-row">
            <div class="upload-field">
              <label for="file-mp3">音频文件 (MP3/WAV)</label>
              <input type="file" id="file-mp3" accept=".mp3,.wav,.flac" required>
            </div>
            <div class="upload-field">
              <label for="file-lyrics">歌词文件 (TXT/LRC)</label>
              <input type="file" id="file-lyrics" accept=".txt,.lrc" required>
            </div>
          </div>
          <div class="upload-options">
            <label><input type="checkbox" id="opt-skip-sep"> 跳过人声分离 (已是纯人声)</label>
            <label><input type="checkbox" id="opt-ass-only"> 只生成 ASS 字幕</label>
            <label><input type="checkbox" id="opt-beat"> 节奏动画</label>
            <select id="opt-lang">
              <option value="zh">中文</option>
              <option value="en">英文</option>
              <option value="ja">日文</option>
              <option value="ko">韩文</option>
            </select>
          </div>
          <button type="submit" id="btn-upload" class="btn btn-primary">
            🚀 上传并生成
          </button>
        </form>
      </div>
    </section>

    <!-- 任务列表 -->
    <section id="tasks-section">
      <div class="section-header">
        <h2>📋 我的任务</h2>
        <button id="btn-refresh" class="btn btn-sm">🔄 刷新</button>
      </div>
      <div id="tasks-list"></div>
      <div id="tasks-empty" class="empty-state" style="display:none">
        <p>还没有任务，上传音频开始吧！</p>
      </div>
    </section>
  </div>

  <script src="/static/dashboard.js"></script>
</body>
</html>
